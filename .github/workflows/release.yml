name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements-build.txt

      - name: Build executable
        run: python scripts/build.py --install-deps --version "${{ inputs.tag || github.ref_name }}"

      - name: Package release asset
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ inputs.tag }}" -ne "") {
            $tag = "${{ inputs.tag }}"
          }

          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          $asset = "release-assets/TransportationOverlay-$tag-windows-x64.exe"
          Copy-Item -LiteralPath "dist/TransportationOverlay.exe" -Destination $asset -Force
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: TransportationOverlay-${{ github.ref_name }}-windows-x64
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ github.ref_name }}"
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          fi
          gh release create "$tag" \
            release-assets/* \
            --title "$tag" \
            --generate-notes
